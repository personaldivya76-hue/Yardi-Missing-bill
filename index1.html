<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Reconciliation Tool</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f0f4f8; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 8px solid #1a73e8; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 10px; }
        .lib-status { text-align: center; font-size: 0.85em; margin-bottom: 25px; padding: 5px; border-radius: 4px; }
        .status-ok { background: #d4edda; color: #155724; }
        .status-fail { background: #f8d7da; color: #721c24; }
        
        .upload-section { background: #f8fafc; border: 2px dashed #cbd5e0; padding: 20px; border-radius: 10px; margin-bottom: 20px; transition: 0.3s; }
        .upload-section.active { border-color: #1a73e8; background: #eef2ff; }
        .upload-section.success { border-color: #48bb78; background: #f0fff4; }
        
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #4a5568; }
        input[type="file"] { width: 100%; cursor: pointer; }
        
        button { background: #1a73e8; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 17px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #1557b0; transform: translateY(-1px); }
        #log { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Invoice Recon Tool</h2>
    <div id="libStatus" class="lib-status">Checking system...</div>

    <div class="upload-section" id="box1">
        <label>Step 1: Upload Customer File (Missing Invoices)</label>
        <input type="file" id="customerFile" accept=".csv, .xlsx" onchange="markComplete('box1')">
    </div>

    <div class="upload-section" id="box2">
        <label>Step 2: Upload System Export (Statement Latest Date)</label>
        <input type="file" id="systemFile" accept=".csv, .xlsx" onchange="markComplete('box2')">
    </div>

    <button id="processBtn">Process & Download Results</button>
    <div id="log"></div>
</div>

<script>
    // 1. Check if the library loaded correctly
    window.onload = function() {
        const status = document.getElementById('libStatus');
        if (typeof XLSX !== 'undefined') {
            status.innerText = "● System Ready (Excel Library Loaded)";
            status.className = "lib-status status-ok";
        } else {
            status.innerText = "X System Error: Library not found. Please check internet connection.";
            status.className = "lib-status status-fail";
        }
    };

    function markComplete(id) {
        document.getElementById(id).className = "upload-section success";
    }

    document.getElementById('processBtn').addEventListener('click', async () => {
        const file1 = document.getElementById('customerFile').files[0];
        const file2 = document.getElementById('systemFile').files[0];
        const log = document.getElementById('log');

        if (!file1 || !file2) {
            alert("Please upload both files first.");
            return;
        }

        log.style.display = "block";
        log.style.background = "#e0f2fe";
        log.style.color = "#0369a1";
        log.innerText = "Comparing accounts and dates...";

        try {
            const custData = await readFile(file1);
            const sysData = await readFile(file2);

            // Create a map of your system records
            const sysMap = {};
            sysData.forEach(row => {
                const id = clean(row["Account ID"]);
                if (id) {
                    sysMap[id] = {
                        latestDate: row["Statement Latest Date"] ? new Date(row["Statement Latest Date"]) : null,
                        status: row["Status"] || "ok",
                        credId: fixCredId(row["Credential ID"] || "")
                    };
                }
            });

            // Perform Reconciliation
            const output = custData.map(row => {
                const id = clean(row["Account ID (Without Prefix)"] || row["Account ID"]);
                const targetDate = row["Invoice Date"] ? new Date(row["Invoice Date"]) : null;
                const match = sysMap[id];

                let verdict = "Not Found";
                let sysDateStr = "N/A";
                let credId = "N/A";
                let status = "N/A";

                if (match) {
                    credId = match.credId;
                    status = match.status;
                    sysDateStr = (match.latestDate && !isNaN(match.latestDate)) ? match.latestDate.toISOString().split('T')[0] : "No Date";
                    
                    if (match.latestDate && targetDate) {
                        verdict = (match.latestDate >= targetDate) ? "✅ Fetched" : "❌ Not Fetched (System is Older)";
                    }
                }

                return {
                    "Account ID": id,
                    "Credential ID": credId,
                    "Provider": row["Provider Name"] || "Unknown",
                    "Customer Requested Date": targetDate ? targetDate.toISOString().split('T')[0] : "Error",
                    "System Latest Date": sysDateStr,
                    "Account Status": status,
                    "Verdict": verdict
                };
            });

            // Export result
            const ws = XLSX.utils.json_to_sheet(output);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Recon_Results");
            XLSX.writeFile(wb, "Invoice_Match_Report.xlsx");

            log.style.background = "#dcfce7";
            log.style.color = "#166534";
            log.innerText = "Success! Report downloaded.";

        } catch (e) {
            console.error(e);
            log.style.background = "#fee2e2";
            log.style.color = "#991b1b";
            log.innerText = "Error: Please check that your file column names match exactly.";
        }
    });

    function readFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
                resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" }));
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function clean(val) {
        return val ? val.toString().replace('act_', '').trim().toLowerCase() : null;
    }

    function fixCredId(str) {
        let s = str.toString().replace(/[^a-fA-F0-9]/g, '');
        if (s.length === 32) return `${s.slice(0, 8)}-${s.slice(8, 12)}-${s.slice(12, 16)}-${s.slice(16, 20)}-${s.slice(20)}`;
        return str;
    }
</script>

</body>
</html>
