<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Reconciliation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f4f7f9; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); border-top: 6px solid #1a73e8; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .upload-card { border: 2px dashed #cbd5e0; padding: 20px; border-radius: 10px; margin-bottom: 20px; transition: 0.3s; background: #fafafa; }
        .upload-card.loaded { border-color: #48bb78; background: #f0fff4; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #4a5568; }
        input[type="file"] { width: 100%; cursor: pointer; }
        button { background: #1a73e8; color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #1557b0; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: 500; display: none; }
        .error { background: #fed7d7; color: #c53030; }
        .success { background: #c6f6d5; color: #2f855a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Invoice Recon Tool</h2>

    <div class="upload-card" id="card1">
        <label>1. Upload Customer File (Missing Invoices)</label>
        <input type="file" id="customerFile" accept=".csv, .xlsx" onchange="checkFile('card1')">
    </div>

    <div class="upload-card" id="card2">
        <label>2. Upload System Export (Latest Statements)</label>
        <input type="file" id="systemFile" accept=".csv, .xlsx" onchange="checkFile('card2')">
    </div>

    <button id="processBtn">Compare Data & Download</button>
    
    <div id="status"></div>
</div>

<script>
    // Visual check to show file is selected
    function checkFile(id) {
        document.getElementById(id).classList.add('loaded');
    }

    document.getElementById('processBtn').addEventListener('click', async () => {
        const custFile = document.getElementById('customerFile').files[0];
        const sysFile = document.getElementById('systemFile').files[0];
        const statusDiv = document.getElementById('status');

        // Check if library loaded
        if (typeof XLSX === 'undefined') {
            statusDiv.style.display = 'block';
            statusDiv.className = 'error';
            statusDiv.innerText = "Error: Excel Library failed to load. Please check your internet connection.";
            return;
        }

        if (!custFile || !sysFile) {
            statusDiv.style.display = 'block';
            statusDiv.className = 'error';
            statusDiv.innerText = "Please upload both files first.";
            return;
        }

        statusDiv.style.display = 'block';
        statusDiv.style.background = '#eef2ff';
        statusDiv.className = '';
        statusDiv.innerText = "Matching IDs and checking dates...";

        try {
            const custData = await parseFile(custFile);
            const sysData = await parseFile(sysFile);

            // Step 1: Map System Data
            const systemLookup = {};
            sysData.forEach(row => {
                const id = cleanID(row["Account ID"]);
                if (id) {
                    systemLookup[id] = {
                        latestDate: row["Statement Latest Date"] ? new Date(row["Statement Latest Date"]) : null,
                        status: row["Status"] || "N/A",
                        credId: formatUUID(row["Credential ID"] || "")
                    };
                }
            });

            // Step 2: Reconciliation Logic
            const report = custData.map(row => {
                const id = cleanID(row["Account ID (Without Prefix)"] || row["Account ID"]);
                const custDate = row["Invoice Date"] ? new Date(row["Invoice Date"]) : null;
                const match = systemLookup[id];

                let verdict = "Not Found in System";
                let sysDateStr = "N/A";
                let credId = "N/A";
                let accStatus = "N/A";

                if (match) {
                    credId = match.credId;
                    accStatus = match.status;
                    sysDateStr = (match.latestDate && !isNaN(match.latestDate)) ? match.latestDate.toISOString().split('T')[0] : "No Date Found";
                    
                    if (match.latestDate && custDate) {
                        verdict = (match.latestDate >= custDate) ? "✅ Fetched" : "⚠️ Not Fetched (System Date is Older)";
                    }
                }

                return {
                    "Account ID": id,
                    "Credential ID": credId,
                    "Provider": row["Provider Name"] || "N/A",
                    "Customer Expecting Date": custDate ? custDate.toISOString().split('T')[0] : "Date Error",
                    "System Latest Date": sysDateStr,
                    "Status (ok/off)": accStatus,
                    "Final Verdict": verdict
                };
            });

            // Step 3: Export Result
            const ws = XLSX.utils.json_to_sheet(report);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Reconciliation");
            XLSX.writeFile(wb, "Invoice_Reconciliation_Results.xlsx");

            statusDiv.className = 'success';
            statusDiv.innerText = "Comparison Success! File downloaded.";

        } catch (err) {
            console.error(err);
            statusDiv.className = 'error';
            statusDiv.innerText = "Error parsing files. Check that column names are correct.";
        }
    });

    function parseFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
                resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" }));
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function cleanID(val) {
        return val ? val.toString().replace('act_', '').trim().toLowerCase() : null;
    }

    function formatUUID(str) {
        let s = str.toString().replace(/[^a-fA-F0-9]/g, '');
        return (s.length === 32) ? `${s.slice(0, 8)}-${s.slice(8, 12)}-${s.slice(12, 16)}-${s.slice(16, 20)}-${s.slice(20)}` : str;
    }
</script>

</body>
</html>
